<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Blue Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 450px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease-out;
        }

        .dashboard {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.5s ease-out;
            display: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #2a5298;
            margin-bottom: 10px;
            font-weight: 700;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1em;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.95em;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1em;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        input:focus {
            outline: none;
            border-color: #2a5298;
            background: white;
            box-shadow: 0 0 0 4px rgba(42, 82, 152, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #2a5298 0%, #1e3c72 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            margin-top: 15px;
        }

        @media (hover: hover) {
            .btn-primary:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 25px rgba(42, 82, 152, 0.4);
            }
        }

        .btn-primary:active {
            transform: translateY(0);
            opacity: 0.9;
        }

        .error-message {
            color: #dc3545;
            margin-top: 15px;
            font-size: 0.9em;
            display: none;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            padding: 15px 30px;
            background: transparent;
            border: none;
            color: #666;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            position: relative;
            border-radius: 8px 8px 0 0;
        }

        .tab:hover {
            color: #2a5298;
            background: rgba(42, 82, 152, 0.05);
        }

        .tab.active {
            color: #2a5298;
            background: rgba(42, 82, 152, 0.1);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #2a5298, #FFD700);
            box-shadow: 0 0 10px rgba(42, 82, 152, 0.5);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h2 {
            color: #2a5298;
            font-weight: 700;
        }

        .user-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: linear-gradient(135deg, #2a5298 0%, #1e3c72 100%);
            color: white;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .user-badge::before {
            content: '👤';
            font-size: 1.1em;
        }

        .btn-logout {
            padding: 10px 20px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .btn-logout:hover {
            background: #c82333;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.3);
        }

        .update-card {
            background: #fafafa;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .update-card:hover {
            border-color: #2a5298;
            box-shadow: 0 5px 20px rgba(42, 82, 152, 0.1);
        }

        .update-date {
            color: #2a5298;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .update-content {
            color: #333;
            line-height: 1.7;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .update-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .btn-edit, .btn-delete {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .btn-edit {
            background: #2a5298;
            color: white;
        }

        .btn-edit:hover {
            background: #1e3c72;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(42, 82, 152, 0.3);
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .btn-delete:hover {
            background: #c82333;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.3);
        }

        .btn-add {
            padding: 12px 24px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #1e3c72;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            margin-bottom: 25px;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.4);
        }

        .edit-form {
            background: white;
            border: 2px solid #2a5298;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .edit-form h3 {
            color: #2a5298;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1em;
            font-family: 'Poppins', sans-serif;
            min-height: 150px;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 4px rgba(42, 82, 152, 0.1);
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-save, .btn-cancel {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .btn-save {
            background: #28a745;
            color: white;
        }

        .btn-save:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }

        .btn-cancel {
            background: #6c757d;
            color: white;
        }

        .btn-cancel:hover {
            background: #5a6268;
        }

        .settings-card {
            background: linear-gradient(135deg, #fafafa 0%, #f0f0f0 100%);
            border: 2px solid #2a5298;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            position: relative;
        }

        .settings-card::before {
            content: '🔒';
            font-size: 3em;
            display: block;
            margin-bottom: 20px;
        }

        .settings-card h3 {
            color: #2a5298;
            margin-bottom: 25px;
            font-size: 1.5em;
        }

        .settings-info {
            color: #333;
            line-height: 2;
            font-size: 1.1em;
        }

        .settings-info strong {
            color: #2a5298;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state::before {
            content: '📝';
            font-size: 4em;
            display: block;
            margin-bottom: 20px;
        }

        .read-only-badge {
            display: inline-block;
            background: #ffc107;
            color: #1e3c72;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            margin-left: 10px;
        }

        .star-rating {
            display: flex;
            gap: 8px;
            margin: 15px 0;
            font-size: 1.8em;
            justify-content: flex-start;
            align-items: center;
        }

        .star {
            cursor: pointer;
            filter: grayscale(100%);
            opacity: 0.4;
            transition: all 0.3s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        @media (hover: hover) {
            .star:hover:not(.readonly) {
                transform: scale(1.2);
                filter: grayscale(0%) drop-shadow(0 0 8px rgba(255, 215, 0, 0.8));
                opacity: 1;
            }
        }

        .star:active:not(.readonly) {
            transform: scale(1.1);
        }

        .star.filled {
            filter: grayscale(0%);
            opacity: 1;
        }

        .star.readonly {
            cursor: default;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .calendar-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(250, 250, 250, 0.9));
            backdrop-filter: blur(10px);
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.4s ease;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        @media (hover: hover) {
            .calendar-card:hover {
                transform: translateY(-5px);
                border-color: #2a5298;
                box-shadow: 0 10px 30px rgba(42, 82, 152, 0.2);
            }
        }

        .calendar-card:active {
            transform: scale(0.98);
        }

        .calendar-card.progress-0 { 
            border-left: 5px solid #ccc;
            background: linear-gradient(135deg, rgba(240, 240, 240, 0.9), rgba(230, 230, 230, 0.9));
        }
        .calendar-card.progress-1 { 
            border-left: 5px solid #87ceeb;
            background: linear-gradient(135deg, rgba(240, 248, 255, 0.9), rgba(230, 245, 255, 0.9));
        }
        .calendar-card.progress-2 { 
            border-left: 5px solid #87ceeb;
            background: linear-gradient(135deg, rgba(230, 245, 255, 0.9), rgba(220, 240, 255, 0.9));
        }
        .calendar-card.progress-3 { 
            border-left: 5px solid #2a5298;
            background: linear-gradient(135deg, rgba(220, 235, 255, 0.9), rgba(210, 230, 250, 0.9));
        }
        .calendar-card.progress-4 { 
            border-left: 5px solid #FFD700;
            background: linear-gradient(135deg, rgba(255, 250, 220, 0.9), rgba(255, 245, 200, 0.9));
        }
        .calendar-card.progress-5 { 
            border-left: 5px solid #FFD700;
            background: linear-gradient(135deg, rgba(255, 245, 200, 0.9), rgba(255, 240, 180, 0.9));
        }

        .calendar-date {
            font-size: 1.2em;
            font-weight: 600;
            color: #2a5298;
            margin-bottom: 10px;
        }

        .calendar-stars {
            font-size: 1.5em;
            color: #FFD700;
            margin-bottom: 10px;
        }

        .calendar-preview {
            font-size: 0.85em;
            color: #666;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .chart-container {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(250, 250, 250, 0.95));
            backdrop-filter: blur(10px);
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .chart-title {
            color: #2a5298;
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
        }

        .chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            height: 300px;
            padding: 20px 0;
            border-bottom: 2px solid #2a5298;
            position: relative;
        }

        .chart-bar {
            flex: 1;
            max-width: 80px;
            background: linear-gradient(to top, #2a5298, #4a7cd6);
            border-radius: 10px 10px 0 0;
            margin: 0 5px;
            position: relative;
            transition: all 0.5s ease;
            animation: growBar 0.8s ease-out;
        }

        @keyframes growBar {
            from {
                height: 0;
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (hover: hover) {
            .chart-bar:hover {
                background: linear-gradient(to top, #FFD700, #FFA500);
                transform: scale(1.05);
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            }
        }

        .chart-label {
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75em;
            color: #666;
            white-space: nowrap;
            font-weight: 500;
        }

        .chart-value {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2em;
            color: #2a5298;
            font-weight: 600;
        }


        @media (max-width: 768px) {
            .login-card {
                padding: 40px 30px;
            }

            .dashboard {
                padding: 25px;
            }

            h1 {
                font-size: 2em;
            }

            .tabs {
                flex-direction: column;
                gap: 5px;
            }

            .tab {
                text-align: left;
            }

            .header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .form-actions {
                flex-direction: column;
            }

            .btn-save, .btn-cancel {
                width: 100%;
            }

            .calendar-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }

            .chart {
                height: 250px;
            }

            .star-rating {
                font-size: 1.5em;
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card" id="loginCard">
            <h1>✨ Welcome</h1>
            <p class="subtitle">Royal Blue Dashboard</p>
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required autocomplete="username">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary">Enter</button>
                <p class="error-message" id="errorMessage"></p>
            </form>
        </div>

        <div class="dashboard" id="dashboard">
            <div class="header">
                <div>
                    <h2>Dashboard</h2>
                    <span class="user-badge" id="userBadge"></span>
                </div>
                <button class="btn-logout" id="logoutBtn">Logout</button>
            </div>

            <div class="tabs">
                <button class="tab active" data-tab="updates">Weekly Updates</button>
                <button class="tab" data-tab="calendar">Calendar</button>
                <button class="tab" data-tab="graph">Progress Graph</button>
                <button class="tab" data-tab="settings">Settings</button>
            </div>

            <div class="tab-content active" id="updatesTab">
                <div id="editorControls" class="hidden">
                    <button class="btn-add" id="addUpdateBtn">+ Add New Update</button>
                </div>

                <div id="editForm" class="edit-form hidden">
                    <h3 id="formTitle">Add New Update</h3>
                    <div id="starRatingEditor" class="hidden">
                        <label style="margin-bottom: 10px; display: block; color: #333; font-weight: 600;">Progress Rating:</label>
                        <div class="star-rating" id="starRatingInput">
                            <span class="star" data-rating="1">⭐</span>
                            <span class="star" data-rating="2">⭐</span>
                            <span class="star" data-rating="3">⭐</span>
                            <span class="star" data-rating="4">⭐</span>
                            <span class="star" data-rating="5">⭐</span>
                        </div>
                    </div>
                    <textarea id="updateContent" placeholder="Write your weekly update here... You can use numbers, quotes, symbols, emojis, and stars (★ ✨ ⭐)"></textarea>
                    <div class="form-actions">
                        <button class="btn-save" id="saveBtn">Save</button>
                        <button class="btn-cancel" id="cancelBtn">Cancel</button>
                    </div>
                </div>

                <div id="updatesList"></div>
            </div>

            <div class="tab-content" id="calendarTab">
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>

            <div class="tab-content" id="graphTab">
                <div class="chart-container">
                    <div class="chart-title">Weekly Progress Overview</div>
                    <div class="chart" id="progressChart"></div>
                </div>
            </div>

            <div class="tab-content" id="settingsTab">
                <div class="settings-card">
                    <h3>Developer Information</h3>
                    <div class="settings-info">
                        <p><strong>Made by:</strong> Antoine Jabre</p>
                        <p><strong>Number:</strong> 76 396 690</p>
                        <p><strong>Email:</strong> antoine.e.jabre@gmail.com</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentRole = null;
        let editingIndex = null;
        let currentStarRating = 0;

        const users = {
            editor: ['marita'],
            owner: ['antoine', 'tintoine']
        };

        const MARITA_PASSWORD = 'Penis';

        function normalizeUsername(username) {
            return username.toLowerCase().trim();
        }

        function getUserRole(username) {
            const normalized = normalizeUsername(username);
            if (users.editor.includes(normalized)) return 'editor';
            if (users.owner.includes(normalized)) return 'owner';
            return null;
        }

        function validateMaritaPassword(username, password) {
            const normalized = normalizeUsername(username);
            if (normalized === 'marita') {
                if (password === '') {
                    return false;
                }
                return password === MARITA_PASSWORD;
            }
            return true;
        }

        function getUpdates() {
            const updates = localStorage.getItem('weeklyUpdates');
            return updates ? JSON.parse(updates) : [];
        }

        function saveUpdates(updates) {
            localStorage.setItem('weeklyUpdates', JSON.stringify(updates));
        }

        function formatDate(date) {
            const options = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            return new Date(date).toLocaleDateString('en-US', options);
        }

        function renderStars(rating, readonly = false) {
            const stars = [];
            for (let i = 1; i <= 5; i++) {
                const filled = i <= rating ? 'filled' : '';
                const readonlyClass = readonly ? 'readonly' : '';
                stars.push(`<span class="star ${filled} ${readonlyClass}">⭐</span>`);
            }
            return `<div class="star-rating">${stars.join('')}</div>`;
        }

        function renderUpdates() {
            const updates = getUpdates();
            const updatesList = document.getElementById('updatesList');
            
            if (updates.length === 0) {
                updatesList.innerHTML = '<div class="empty-state"><p>No updates yet. Add your first weekly update!</p></div>';
                return;
            }

            updatesList.innerHTML = updates.map((update, index) => {
                const rating = update.rating || 0;
                const starsHTML = rating > 0 ? renderStars(rating, true) : '';
                
                const actionsHTML = currentRole === 'editor' ? `
                    <div class="update-actions">
                        <button class="btn-edit" onclick="editUpdate(${index})">Edit</button>
                        <button class="btn-delete" onclick="deleteUpdate(${index})">Delete</button>
                    </div>
                ` : '';

                return `
                    <div class="update-card">
                        <div class="update-date">📅 ${formatDate(update.date)}</div>
                        ${starsHTML}
                        <div class="update-content">${update.content}</div>
                        ${actionsHTML}
                    </div>
                `;
            }).reverse().join('');
        }

        function renderCalendar() {
            const updates = getUpdates();
            const calendarGrid = document.getElementById('calendarGrid');
            
            if (updates.length === 0) {
                calendarGrid.innerHTML = '<div class="empty-state"><p>No updates to display in calendar view.</p></div>';
                return;
            }

            calendarGrid.innerHTML = updates.map((update, index) => {
                const rating = update.rating || 0;
                const stars = '⭐'.repeat(rating);
                const preview = update.content.substring(0, 80) + (update.content.length > 80 ? '...' : '');
                const dateObj = new Date(update.date);
                const shortDate = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

                return `
                    <div class="calendar-card progress-${rating}" onclick="viewUpdate(${index})">
                        <div class="calendar-date">${shortDate}</div>
                        <div class="calendar-stars">${stars || '☆'}</div>
                        <div class="calendar-preview">${preview}</div>
                    </div>
                `;
            }).reverse().join('');
        }

        function renderGraph() {
            const updates = getUpdates();
            const chart = document.getElementById('progressChart');
            
            if (updates.length === 0) {
                chart.innerHTML = '<div class="empty-state"><p>No data to display. Add updates to see progress.</p></div>';
                return;
            }

            const recentUpdates = updates.slice(-10).reverse();
            
            chart.innerHTML = recentUpdates.map((update, index) => {
                const rating = update.rating || 0;
                const height = rating > 0 ? (rating / 5) * 100 : 5;
                const dateObj = new Date(update.date);
                const label = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

                const barColor = rating >= 4 ? 'linear-gradient(to top, #FFD700, #FFA500)' : 'linear-gradient(to top, #2a5298, #4a7cd6)';
                
                return `
                    <div class="chart-bar" style="height: ${height}%; background: ${barColor};">
                        <div class="chart-value">${rating > 0 ? '⭐'.repeat(rating) : '☆'}</div>
                        <div class="chart-label">${label}</div>
                    </div>
                `;
            }).join('');
        }

        function viewUpdate(index) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector('[data-tab="updates"]').classList.add('active');
            
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('updatesTab').classList.add('active');
            
            setTimeout(() => {
                const updateCards = document.querySelectorAll('.update-card');
                const reverseIndex = updateCards.length - 1 - index;
                if (updateCards[reverseIndex]) {
                    updateCards[reverseIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
                    updateCards[reverseIndex].style.background = 'rgba(42, 82, 152, 0.1)';
                    setTimeout(() => {
                        updateCards[reverseIndex].style.background = '#fafafa';
                    }, 2000);
                }
            }, 100);
        }

        function setStarRating(rating) {
            currentStarRating = rating;
            const stars = document.querySelectorAll('#starRatingInput .star');
            stars.forEach((star, index) => {
                if (index < rating) {
                    star.classList.add('filled');
                } else {
                    star.classList.remove('filled');
                }
            });
        }

        function showEditForm(title = 'Add New Update', content = '', rating = 0) {
            document.getElementById('formTitle').textContent = title;
            document.getElementById('updateContent').value = content;
            document.getElementById('editForm').classList.remove('hidden');
            
            if (currentRole === 'editor') {
                document.getElementById('starRatingEditor').classList.remove('hidden');
                setStarRating(rating);
            } else {
                document.getElementById('starRatingEditor').classList.add('hidden');
            }
            
            document.getElementById('updateContent').focus();
        }

        function hideEditForm() {
            document.getElementById('editForm').classList.add('hidden');
            document.getElementById('updateContent').value = '';
            currentStarRating = 0;
            setStarRating(0);
            editingIndex = null;
        }

        function editUpdate(index) {
            const updates = getUpdates();
            editingIndex = index;
            const update = updates[index];
            showEditForm('Edit Update', update.content, update.rating || 0);
        }

        function deleteUpdate(index) {
            if (confirm('Are you sure you want to delete this update?')) {
                const updates = getUpdates();
                updates.splice(index, 1);
                saveUpdates(updates);
                renderUpdates();
                renderCalendar();
                renderGraph();
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const normalizedUsername = normalizeUsername(username);

            errorMessage.style.display = 'none';

            const role = getUserRole(username);

            if (!role) {
                errorMessage.textContent = 'Access denied. Unauthorized user.';
                errorMessage.style.display = 'block';
                return;
            }

            if (normalizedUsername === 'marita') {
                if (password === '') {
                    errorMessage.textContent = 'Wrong password. Access denied.';
                    errorMessage.style.display = 'block';
                    return;
                }
                if (password !== MARITA_PASSWORD) {
                    errorMessage.textContent = 'Wrong password. Access denied.';
                    errorMessage.style.display = 'block';
                    return;
                }
            }

            currentUser = username;
            currentRole = role;

            document.getElementById('loginCard').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            
            const userBadge = document.getElementById('userBadge');
            userBadge.textContent = currentUser;
            
            if (currentRole === 'owner') {
                userBadge.innerHTML = `${currentUser} <span class="read-only-badge">READ-ONLY</span>`;
            }

            if (currentRole === 'editor') {
                document.getElementById('editorControls').classList.remove('hidden');
            }

            errorMessage.style.display = 'none';
            
            renderUpdates();
        });

        document.getElementById('logoutBtn').addEventListener('click', function() {
            currentUser = null;
            currentRole = null;
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginCard').style.display = 'block';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('errorMessage').style.display = 'none';
            hideEditForm();
            
            document.querySelectorAll('.tab')[0].click();
        });

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                
                this.classList.add('active');
                const tabName = this.dataset.tab;
                document.getElementById(tabName + 'Tab').classList.add('active');

                if (tabName === 'calendar') {
                    renderCalendar();
                } else if (tabName === 'graph') {
                    renderGraph();
                }
            });
        });

        document.getElementById('addUpdateBtn').addEventListener('click', function() {
            editingIndex = null;
            showEditForm();
        });

        document.getElementById('saveBtn').addEventListener('click', function() {
            const content = document.getElementById('updateContent').value.trim();
            
            if (!content) {
                alert('Please enter some content for the update.');
                return;
            }

            const updates = getUpdates();

            if (editingIndex !== null) {
                updates[editingIndex].content = content;
                updates[editingIndex].date = new Date().toISOString();
                updates[editingIndex].rating = currentStarRating;
            } else {
                updates.push({
                    date: new Date().toISOString(),
                    content: content,
                    rating: currentStarRating
                });
            }

            saveUpdates(updates);
            renderUpdates();
            renderCalendar();
            renderGraph();
            hideEditForm();
        });

        document.getElementById('cancelBtn').addEventListener('click', function() {
            hideEditForm();
        });

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });

        document.querySelectorAll('#starRatingInput .star').forEach(star => {
            star.addEventListener('click', function() {
                if (currentRole === 'editor') {
                    const rating = parseInt(this.dataset.rating);
                    setStarRating(rating);
                }
            });
        });


        window.editUpdate = editUpdate;
        window.deleteUpdate = deleteUpdate;
        window.viewUpdate = viewUpdate;
    </script>
</body>
</html>
